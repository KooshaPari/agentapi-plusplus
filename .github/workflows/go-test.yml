name: Go Tests

on:
    push:
        branches: [main]
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "stable"

            - name: Test
              run: CGO_ENABLED=0 GOFLAGS=-mod=mod go test -count=1 -v ./...

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "stable"

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2

            - name: Install Chat Dependencies
              run: cd chat && bun install

            - name: Lint Go
              run: GOFLAGS=-mod=mod go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0 run ./... --timeout 5m

            - name: Lint Chat
              run: cd chat && bun run lint

            - name: Check for unstaged changes
              run: |
                  GOFLAGS=-mod=mod go generate ./...
                  ./check_unstaged.sh
