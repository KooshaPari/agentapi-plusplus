version: '3'

vars:
  DETECTED_LANGUAGES: Go, Bun/Node
  GO_CACHE_DIR: .cache/go-build
  GO_TMP_DIR: .cache/go-tmp

tasks:
  default:
    desc: List common tasks for detected language targets.
    cmds:
      - task --list

  build:
    desc: Build detected language targets ({{.DETECTED_LANGUAGES}}).
    cmds:
      - task: build:go
      - task: build:chat
      - task: build:docs

  build:go:
    internal: true
    status:
      - test ! -f go.mod
    cmds:
      - |
        bash -euo pipefail -c '
          export GOCACHE="$PWD/{{.GO_CACHE_DIR}}"
          export GOTMPDIR="$PWD/{{.GO_TMP_DIR}}"
          mkdir -p "$GOCACHE" "$GOTMPDIR"
          go build -o ./agentapi ./main.go
        '

  build:chat:
    internal: true
    status:
      - test ! -f package.json
    dir: chat
    cmds:
      - |
        bash -euo pipefail -c '
          if [ ! -d node_modules ]; then
            bun install --frozen-lockfile
          fi
          bun run build
        '

  build:docs:
    internal: true
    status:
      - test ! -f package.json || test ! -d ../vendor/phenodocs/packages/docs
    dir: docs
    cmds:
      - |
        bash -euo pipefail -c '
          npm ci --ignore-scripts
          npm run build
        '

  test:
    desc: Run tests for detected language targets ({{.DETECTED_LANGUAGES}}).
    cmds:
      - task: test:go

  test:go:
    internal: true
    status:
      - test ! -f go.mod
    cmds:
      - |
        bash -euo pipefail -c '
          export GOCACHE="$PWD/{{.GO_CACHE_DIR}}"
          export GOTMPDIR="$PWD/{{.GO_TMP_DIR}}"
          mkdir -p "$GOCACHE" "$GOTMPDIR"
          go test -short ./...
        '

  lint:
    desc: Run linters for detected language targets ({{.DETECTED_LANGUAGES}}).
    cmds:
      - task: lint:taskfile
      - task: lint:go
      - task: lint:chat

  lint:taskfile:
    internal: true
    cmds:
      - task --list >/dev/null

  lint:go:
    internal: true
    status:
      - test ! -f go.mod
    cmds:
      - |
        bash -euo pipefail -c '
          export GOCACHE="$PWD/{{.GO_CACHE_DIR}}"
          export GOTMPDIR="$PWD/{{.GO_TMP_DIR}}"
          mkdir -p "$GOCACHE" "$GOTMPDIR"
          git ls-files "*.go" ":!:agentapi-plusplus/**" | xargs gofmt -l | tee /tmp/agentapi-gofmt.out
          test ! -s /tmp/agentapi-gofmt.out
          go vet ./...
        '

  lint:chat:
    internal: true
    status:
      - test ! -f package.json
    dir: chat
    cmds:
      - |
        bash -euo pipefail -c '
          if [ ! -d node_modules ]; then
            bun install --frozen-lockfile
          fi
          bun run lint
        '

  clean:
    desc: Remove generated build artifacts for detected language targets ({{.DETECTED_LANGUAGES}}).
    cmds:
      - task: clean:go
      - task: clean:chat
      - task: clean:docs

  clean:go:
    internal: true
    status:
      - test ! -f go.mod
    cmds:
      - |
        python3 - <<'PY'
        from pathlib import Path
        import os
        import shutil
        import subprocess

        os.environ["GOCACHE"] = str(Path("{{.GO_CACHE_DIR}}").resolve())
        os.environ["GOTMPDIR"] = str(Path("{{.GO_TMP_DIR}}").resolve())
        Path(os.environ["GOCACHE"]).mkdir(parents=True, exist_ok=True)
        Path(os.environ["GOTMPDIR"]).mkdir(parents=True, exist_ok=True)
        subprocess.run(["go", "clean", "-cache", "-testcache"], check=True)
        for path in [Path("agentapi"), Path("{{.GO_CACHE_DIR}}"), Path("{{.GO_TMP_DIR}}")]:
            if path.is_file() or path.is_symlink():
                path.unlink()
            elif path.is_dir():
                shutil.rmtree(path)
        PY

  clean:chat:
    internal: true
    status:
      - test ! -f chat/package.json
    cmds:
      - |
        python3 - <<'PY'
        from pathlib import Path
        import shutil

        for path in [Path("chat/.next"), Path("chat/out"), Path("chat/.turbo")]:
            if path.exists():
                shutil.rmtree(path)
        PY

  clean:docs:
    internal: true
    status:
      - test ! -f docs/package.json
    cmds:
      - |
        python3 - <<'PY'
        from pathlib import Path
        import shutil

        for path in [Path("docs/.vitepress/cache")]:
            if path.exists():
                shutil.rmtree(path)
        PY
