version: '3'

vars:
  DETECTED_LANGUAGES: Go, Bun/Node
  FRONTEND_DIR: chat
  DOCS_DIR: docs
  GO_BINARY: agentapi
  GO_CACHE_DIR: .cache/go-build
  GO_TMP_DIR: .cache/go-tmp
  GO_PACKAGE_PARALLELISM: '1'
  GO_PACKAGES: ./...

tasks:
  default:
    desc: List common tasks for detected language targets.
    cmds:
      - task --list

  build:
    desc: Build detected language targets ({{.DETECTED_LANGUAGES}}).
    summary: |
      Detected targets:
        - Go module at the repository root
        - Bun/Node frontend in {{.FRONTEND_DIR}}/
        - npm/VitePress docs in {{.DOCS_DIR}}/ when the local docs vendor exists
    cmds:
      - task: build:go
      - task: build:chat
      - task: build:docs

  build:go:
    internal: true
    status:
      - test ! -f go.mod
    cmds:
      - |
        bash -euo pipefail -c '
          export GOCACHE="$PWD/{{.GO_CACHE_DIR}}"
          export GOTMPDIR="$PWD/{{.GO_TMP_DIR}}"
          mkdir -p "$GOCACHE" "$GOTMPDIR"
          go build -p {{.GO_PACKAGE_PARALLELISM}} -o ./{{.GO_BINARY}} ./main.go
        '

  build:chat:
    internal: true
    status:
      - test ! -f package.json
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - |
        bash -euo pipefail -c '
          bun install --frozen-lockfile
          bun run build
        '

  build:docs:
    internal: true
    status:
      - test ! -f package.json || test ! -d ../vendor/phenodocs/packages/docs
    dir: '{{.DOCS_DIR}}'
    cmds:
      - |
        bash -euo pipefail -c '
          npm ci --ignore-scripts
          npm run build
        '

  test:
    desc: Run tests for detected language targets ({{.DETECTED_LANGUAGES}}).
    summary: |
      Runs the root Go test suite and any detected Bun/Node test script.
    cmds:
      - task: test:go
      - task: test:chat

  test:go:
    internal: true
    status:
      - test ! -f go.mod
    cmds:
      - |
        bash -euo pipefail -c '
          export GOCACHE="$PWD/{{.GO_CACHE_DIR}}"
          export GOTMPDIR="$PWD/{{.GO_TMP_DIR}}"
          mkdir -p "$GOCACHE" "$GOTMPDIR"
          go test -p {{.GO_PACKAGE_PARALLELISM}} -short {{.GO_PACKAGES}}
        '

  test:chat:
    internal: true
    status:
      - test ! -f package.json
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - |
        bash -euo pipefail -c '
          if bun run | grep -Eq "^ +test($|:)"; then
            bun install --frozen-lockfile
            bun run test
          else
            printf "No chat test script detected; skipping Bun/Node tests.\n"
          fi
        '

  lint:
    desc: Run linters for detected language targets ({{.DETECTED_LANGUAGES}}).
    summary: |
      Validates Taskfile syntax, Go formatting/vet checks, and the frontend lint script.
    cmds:
      - task: lint:taskfile
      - task: lint:go
      - task: lint:chat

  lint:taskfile:
    internal: true
    cmds:
      - task --list >/dev/null

  lint:go:
    internal: true
    status:
      - test ! -f go.mod
    cmds:
      - |
        bash -euo pipefail -c '
          export GOCACHE="$PWD/{{.GO_CACHE_DIR}}"
          export GOTMPDIR="$PWD/{{.GO_TMP_DIR}}"
          mkdir -p "$GOCACHE" "$GOTMPDIR"
          git ls-files "*.go" ":!:agentapi-plusplus/**" | xargs gofmt -l | tee /tmp/agentapi-gofmt.out
          test ! -s /tmp/agentapi-gofmt.out
          go vet -p {{.GO_PACKAGE_PARALLELISM}} {{.GO_PACKAGES}}
        '

  lint:chat:
    internal: true
    status:
      - test ! -f package.json
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - |
        bash -euo pipefail -c '
          bun install --frozen-lockfile
          bun run lint
        '

  clean:
    desc: Remove generated build artifacts for detected language targets ({{.DETECTED_LANGUAGES}}).
    summary: |
      Removes root Go build/cache output and generated frontend/docs build artifacts.
    cmds:
      - task: clean:go
      - task: clean:chat
      - task: clean:docs

  clean:go:
    internal: true
    status:
      - test ! -f go.mod
    cmds:
      - |
        python3 - <<'PY'
        from pathlib import Path
        import os
        import shutil
        import subprocess

        os.environ["GOCACHE"] = str(Path("{{.GO_CACHE_DIR}}").resolve())
        os.environ["GOTMPDIR"] = str(Path("{{.GO_TMP_DIR}}").resolve())
        Path(os.environ["GOCACHE"]).mkdir(parents=True, exist_ok=True)
        Path(os.environ["GOTMPDIR"]).mkdir(parents=True, exist_ok=True)
        subprocess.run(["go", "clean", "-cache", "-testcache"], check=True)
        for path in [Path("{{.GO_BINARY}}"), Path("{{.GO_CACHE_DIR}}"), Path("{{.GO_TMP_DIR}}")]:
            if path.is_file() or path.is_symlink():
                path.unlink()
            elif path.is_dir():
                shutil.rmtree(path)
        PY

  clean:chat:
    internal: true
    cmds:
      - |
        python3 - <<'PY'
        from pathlib import Path
        import shutil

        for path in [
            Path("{{.FRONTEND_DIR}}/.next"),
            Path("{{.FRONTEND_DIR}}/out"),
            Path("{{.FRONTEND_DIR}}/.turbo"),
        ]:
            if path.exists():
                shutil.rmtree(path)
        PY

  clean:docs:
    internal: true
    cmds:
      - |
        python3 - <<'PY'
        from pathlib import Path
        import shutil

        for path in [Path("{{.DOCS_DIR}}/.vitepress/cache")]:
            if path.exists():
                shutil.rmtree(path)
        PY
